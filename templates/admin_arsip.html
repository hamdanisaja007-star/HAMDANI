{% extends "layout.html" %}
{% block content %}
<div class="card border-0 shadow-sm rounded-4 p-4">
    <h4 class="fw-bold text-dark mb-4"><i class="fas fa-folder-open text-warning me-2"></i>Arsip Berkas Digital PLKB</h4>
    
    <div class="row">
        {% for folder in daftar_plkb %}
        <div class="col-md-4 mb-3">
            <div class="card border-1 shadow-sm h-100">
                <div class="card-body d-flex align-items-center">
                    <i class="fas fa-user-circle fa-3x text-info me-3"></i>
                    <div>
                        <h6 class="fw-bold mb-1">{{ folder.split('_')[0] }}</h6>
                        <small class="text-muted">NIP: {{ folder.split('_')[1] }}</small>
                        <br>
                        <a href="/admin/lihat_berkas/{{ folder }}" class="btn btn-sm btn-outline-primary mt-2">Buka Folder</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
