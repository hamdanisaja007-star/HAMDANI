<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN | SI-ASN DHEDE_BIMZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }

        /* Layout Split Screen */
        .split-container { display: flex; height: 100vh; width: 100vw; }

        /* SISI KIRI: MONITOR FULL SCREEN */
        .left-side {
            flex: 1.3;
            background-color: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monitor-frame {
            width: 100%;
            height: 100%;
            border: 10px solid #222;
            overflow: hidden;
            position: relative;
        }

        .carousel-inner, .carousel-item { height: 100%; }
        
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Gambar Full tanpa distorsi */
            filter: brightness(0.85); /* Sedikit gelap agar jam & teks menonjol */
        }

        /* Jam Digital Statis di Monitor */
        #digital-clock {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0, 0, 0, 0.7);
            color: #00d2ff;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border: 1px solid #00d2ff;
            z-index: 100;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00d2ff;
        }

        .carousel-caption {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            bottom: 30px;
            padding: 15px;
        }

        /* SISI KANAN: LOGIN AREA */
        .right-side {
            flex: 0.7;
            background: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #ddd;
        }

        .login-box {
            width: 85%;
            max-width: 380px;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .brand-logo { color: #00d2ff; }
        .btn-primary { background: #007bff; border: none; font-weight: bold; padding: 12px; }
    </style>
</head>
<body>

    <div class="split-container">
        
        <div class="left-side">
            <div class="monitor-frame">
                <div id="digital-clock">00:00:00</div>

                <div id="monitorCarousel" class="carousel slide carousel-fade h-100" data-bs-ride="carousel" data-bs-interval="5000">
                    <div class="carousel-inner h-100">
                        <div class="carousel-item active">
                            <img src="{{ url_for('static', filename='images/slide1.jpg') }}" alt="Slide 1">
                            <div class="carousel-caption d-none d-md-block text-start">
                                <h5 class="fw-bold text-info">REGION PABUARAN</h5>
                                <p class="small mb-0">Monitor Aktivitas & Pelaporan PLKB Terintegrasi.</p>
                            </div>
                        </div>

                        <div class="carousel-item">
                            <img src="{{ url_for('static', filename='images/slide2.jpg') }}" alt="Slide 2">
                            <div class="carousel-caption d-none d-md-block text-start">
                                <h5 class="fw-bold text-info">REGION CIREUNGHAS</h5>
                                <p class="small mb-0">Otomasi Data SIGA & E-Visum Dhede_Bimz.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="login-box text-center">
                <div class="mb-3">
                    <i class="fas fa-robot fa-4x brand-logo"></i>
                </div>
                <h4 class="fw-bold mb-1">SIDALAP</h4>
                <p class="text-muted small mb-4">SISTEM DATA LINI LAPANGAN </p>

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control bg-light" placeholder="NIP / Username Admin" required>
                    </div>
                    <div class="mb-4">
                        <input type="password" name="password" class="form-control bg-light" placeholder="******" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow">
                        MASUK SEKARANG
                    </button>
                </form>
                
                <div class="mt-4 border-top pt-3 text-muted" style="font-size: 11px;">
                    IPeKB KABUPATEN SUKABUMI.<br>
                    <strong>Produck by: Team R&D © 2026.</strong>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
